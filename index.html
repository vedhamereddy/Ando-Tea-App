<body>
  <div id="root"></div>
  <script>
    (function () {
      const MOBILE_W = 390, MOBILE_H = 844;

      // Always set transform on desktop so position:fixed children anchor
      // to #root instead of the full viewport
      function applyScale() {
        if (window.innerWidth < 600) return;
        const root = document.getElementById('root');
        const scale = Math.min(window.innerWidth / MOBILE_W, window.innerHeight / MOBILE_H, 1);
        root.style.transform = `scale(${scale})`;
      }
      applyScale();
      window.addEventListener('resize', applyScale);

      // Blur any element that gains focus from a click so the browser
      // never scroll-jumps the overflow:hidden landscape container
      document.addEventListener('click', function() {
        if (document.activeElement && document.activeElement !== document.body) {
          document.activeElement.blur();
        }
      }, true);

      // DEAD CODE BELOW — kept as safety net but vw/vh are now baked as px
      if (window.innerWidth < 600) return;
      let _patching = false;
      function patchEl(el) {
        if (_patching || !el.style || el.style.length === 0) return;
        const props = Array.from(el.style);
        const updates = {};
        props.forEach(prop => {
          const val = el.style.getPropertyValue(prop);
          if (!val.includes('vw') && !val.includes('vh')) return;
          const next = val
            .replace(/(\d*\.?\d+)vw/g, (_, n) => `${(+n * MOBILE_W / 100).toFixed(3)}px`)
            .replace(/(\d*\.?\d+)vh/g, (_, n) => `${(+n * MOBILE_H / 100).toFixed(3)}px`);
          if (next !== val) updates[prop] = next;
        });
        if (Object.keys(updates).length) {
          _patching = true;
          Object.entries(updates).forEach(([p, v]) => el.style.setProperty(p, v));
          _patching = false;
        }
      }
      function patchTree(root) {
        patchEl(root);
        root.querySelectorAll && root.querySelectorAll('[style]').forEach(patchEl);
      }
      const obs = new MutationObserver(mutations => {
        mutations.forEach(m => {
          if (m.type === 'attributes') { patchEl(m.target); return; }
          m.addedNodes.forEach(n => { if (n.nodeType === 1) patchTree(n); });
        });
      });
      obs.observe(document.documentElement, {
        subtree: true, childList: true,
        attributes: true, attributeFilter: ['style']
      });
    })();
  </script>

  <script>
    let audioCtx = null;
    const PENTATONIC = [277.18, 329.63, 369.99, 415.30, 493.88, 554.37, 659.25];
    
    window.playSuikinkutsu = function() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(PENTATONIC[Math.floor(Math.random() * PENTATONIC.length)] * 2, audioCtx.currentTime);
      
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.05);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.8);
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 800;
      filter.Q.value = 15;
      
      osc.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + 1.5);
    };

    window.playBellRing = function() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const t = audioCtx.currentTime;
      // Two metallic bell tones for suzu sound
      [880, 1318.5].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, t);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.98, t + 1.5);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(i === 0 ? 0.15 : 0.08, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t + i * 0.05);
        osc.stop(t + 2.0);
      });
      // Add shimmer harmonics
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(2637, t);
      gain2.gain.setValueAtTime(0, t);
      gain2.gain.linearRampToValueAtTime(0.03, t + 0.01);
      gain2.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.start(t);
      osc2.stop(t + 1.0);
    };

    window.playBark = function() {
      const audio = new Audio('./DogBark.wav');
      audio.volume = 0.6;
      audio.play();
    };

    window.playTreeRustle = function() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const bufferSize = audioCtx.sampleRate * 0.6;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const bandpass = audioCtx.createBiquadFilter();
      bandpass.type = 'bandpass';
      bandpass.frequency.value = 2500;
      bandpass.Q.value = 0.5;

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

      noise.connect(bandpass);
      bandpass.connect(gain);
      gain.connect(audioCtx.destination);
      noise.start();
    };
  </script>

        onIdle:      { speedMult: 0.9, filterMult: 1.0, biomeBias: null, whisper: 'Explore what\'s around you...', whisperJp: '周りを探って', circleColor: 'rgba(200,170,80,0.4)', forceSwitch: false, ensoSize: 44 },
        onDeepIdle:  { speedMult: 0.85, filterMult: 1.1, biomeBias: ['shrine', 'sakura'], whisper: 'Tap something that calls to you...', whisperJp: '心に響くものに触れて', circleColor: 'rgba(180,120,140,0.4)', forceSwitch: true, ensoSize: 44 },
        default:     { speedMult: 0.95, filterMult: 1.0, biomeBias: null, whisper: null, circleColor: 'rgba(80,100,160,0.4)', forceSwitch: false, ensoSize: 44 },
      },
    };

    // Behavioral inference state (outside React to avoid re-renders)
    const behaviorState = {
      tapTimestamps: [],
      lastInteractionTime: Date.now(),
      sessionStartTime: Date.now(),

    const GroundPlane = () => (
      <div className="absolute bottom-0 w-full h-[177.24px] z-[1]" />

    const WoodBoardwalk = () => (
      <>
        <div className="absolute bottom-[42.20px] w-full h-[168.80px] z-[5] pointer-events-none drop-shadow-2xl">
          <svg viewBox="0 0 2600 100" preserveAspectRatio="none" className="w-full h-full">
             {/* Soft shadow below boardwalk */}

    const BiomeMusic = ({ visibleBiomes = [] }) => {
      const audiosRef = useRef({});
      const activeRef = useRef(null);
      const [audioReady, setAudioReady] = useState(false);

      useEffect(() => {
        // Create audio elements once
        Object.entries(BIOME_MUSIC).forEach(([biome, src]) => {
          if (!audiosRef.current[biome]) {
            const audio = new Audio(src);
            audio.loop = true;
            audio.volume = 0;
            audio.preload = 'auto';
            audiosRef.current[biome] = audio;
          }
        });
        // Wait for first user click to unlock audio
        const init = () => {
          setAudioReady(true);
          document.removeEventListener('click', init);
          document.removeEventListener('touchstart', init);
        };
        document.addEventListener('click', init);
        document.addEventListener('touchstart', init);
        return () => {
          document.removeEventListener('click', init);
          document.removeEventListener('touchstart', init);
        };
      }, []);

      useEffect(() => {
        if (!audioReady) return;

        // Find which music biome is currently visible
        const currentMusicBiome = visibleBiomes.find(b => BIOME_MUSIC[b]) || null;

        if (currentMusicBiome === activeRef.current) return;

        const fadeStep = 0.002;
        const fadeInterval = 50;

        // Fade out current
        if (activeRef.current && audiosRef.current[activeRef.current]) {
          const oldAudio = audiosRef.current[activeRef.current];
          const fadeOut = setInterval(() => {
            if (oldAudio.volume > fadeStep) {
              oldAudio.volume = Math.max(0, oldAudio.volume - fadeStep);
            } else {
              oldAudio.volume = 0;
              oldAudio.pause();
              clearInterval(fadeOut);
            }
          }, fadeInterval);
        }

        // Fade in new
        if (currentMusicBiome && audiosRef.current[currentMusicBiome]) {
          const newAudio = audiosRef.current[currentMusicBiome];
          newAudio.play().catch(() => {});
          const fadeIn = setInterval(() => {
            if (newAudio.volume < 0.04 - fadeStep) {
              newAudio.volume = Math.min(0.4, newAudio.volume + fadeStep);
            } else {
              newAudio.volume = 0.04;
              clearInterval(fadeIn);
            }
          }, fadeInterval);
        }

        activeRef.current = currentMusicBiome;
      }, [visibleBiomes, audioReady]);

      return null;
    };

      const showWhisper = (text, jp) => {
        clearTimeout(whisperTimeoutRef.current);
        setWhisper(text);

        whisperTimeoutRef.current = setTimeout(() => {
          setWhisper(null);
          setWhisperJp(null);

      };

      useEffect(() => {
        behaviorState.sessionStartTime = Date.now();
        behaviorState.lastInteractionTime = Date.now();
        behaviorState.targetSpeed = moodSpeed;
        behaviorState.adaptiveSpeed = moodSpeed;

        // Time of day baseline bias
        const hour = new Date().getHours();
        let timeBias = null;
        if (hour >= 6 && hour < 11) timeBias = ['sakura', 'shrine'];
        else if (hour >= 12 && hour < 17) timeBias = null;
        else if (hour >= 18 && hour < 22) timeBias = ['zen', 'bamboo'];
        else timeBias = ['snow', 'zen'];

        // Track taps with dwell time
        const trackTap = () => {
          const now = Date.now();
          if (behaviorState.lastTapTime > 0) {
            const dwell = now - behaviorState.lastTapTime;
            behaviorState.dwellTimes.push(dwell);
            if (behaviorState.dwellTimes.length > 20) {
              behaviorState.dwellTimes = behaviorState.dwellTimes.slice(-20);
            }
          }
          behaviorState.lastTapTime = now;
          behaviorState.tapTimestamps.push(now);
          behaviorState.lastInteractionTime = now;
          if (behaviorState.tapTimestamps.length > 20) {
            behaviorState.tapTimestamps = behaviorState.tapTimestamps.slice(-20);
          }
        };
        document.addEventListener('click', trackTap);
        document.addEventListener('touchstart', trackTap);

        // Evaluate behavior every 2 seconds using GOAL-ORIENTED system
        const evalInterval = setInterval(() => {
          const now = Date.now();
          const recentTaps = behaviorState.tapTimestamps.filter(t => now - t < 5000);
          const idleSeconds = (now - behaviorState.lastInteractionTime) / 1000;
          const sessionMin = (now - behaviorState.sessionStartTime) / 60000;
          const avgDwell = behaviorState.dwellTimes.length > 2
            ? behaviorState.dwellTimes.slice(-5).reduce((a, b) => a + b, 0) / Math.min(5, behaviorState.dwellTimes.length)
            : 5000;

          // Get the goal config for this user's initial mood
          const goalConfig = ADAPTIVE_GOALS[initialMood] || ADAPTIVE_GOALS.explore;

          // ===== BEHAVIORAL STATE DETECTION =====
          let behaviorKey = 'default';

          if (recentTaps.length >= 5 && avgDwell < 1000) {
            behaviorKey = 'onRapidTap';
          } else if (recentTaps.length >= 2 && avgDwell < 3000) {
            behaviorKey = 'onModerate';
          } else if (idleSeconds >= 60) {
            behaviorKey = 'onDeepIdle';
          } else if (idleSeconds >= 20) {
            behaviorKey = 'onIdle';
          }

          const config = goalConfig[behaviorKey];

          // Only update if behavior state changed
          if (behaviorKey !== prevMoodRef.current) {
            prevMoodRef.current = behaviorKey;
            behaviorState.detectedMood = behaviorKey;
            setDetectedMood(behaviorKey);

            // Show whisper feedback
            if (config.whisper) {
              showWhisper(config.whisper, config.whisperJp);
            }

            // Apply biome bias
            if (config.biomeBias) {
              behaviorState.biomeBias = config.biomeBias;
            } else {
              behaviorState.biomeBias = timeBias;
            }

            // Apply filter intensity
            setFilterIntensity(config.filterMult);

            // Force biome switch if config says to
            if (config.forceSwitch && config.biomeBias) {
              const targetBiome = config.biomeBias[Math.floor(Math.random() * config.biomeBias.length)];
              if (onForceSwitch) onForceSwitch(targetBiome);
            }
          }

          // Apply speed (always lerp)
          behaviorState.targetSpeed = moodSpeed * config.speedMult;

          // Session duration UI fade (5+ min)
          if (sessionMin > 5) {
            const fadeAmount = Math.max(0.3, 1 - (sessionMin - 5) * 0.07);
            setHeaderOpacity(fadeAmount);
          }

          // Smooth speed interpolation
          const diff = behaviorState.targetSpeed - behaviorState.adaptiveSpeed;
          behaviorState.adaptiveSpeed += diff * 0.3;
          setScrollSpeed(behaviorState.adaptiveSpeed);
        }, 2000);

        return () => {
          document.removeEventListener('click', trackTap);
          document.removeEventListener('touchstart', trackTap);
          clearInterval(evalInterval);
          clearTimeout(whisperTimeoutRef.current);
        };
      }, [moodSpeed]);

      return { headerOpacity, detectedMood, whisper, whisperJp };
    };

    // Mode-specific biome selection
    const getWeightedBiome = (currentBiomes, initialMood) => {
      const bias = behaviorState.biomeBias;
      const currentBiome = currentBiomes && currentBiomes.length > 0 ? currentBiomes[currentBiomes.length - 1] : null;
      const lastTwo = currentBiomes ? currentBiomes.slice(-2) : [];

      if (initialMood === 'explore') {
        // EXPLORE: Never repeat last 2 biomes. Maximum variety.
        const available = BIOMES.filter(b => !lastTwo.includes(b));
        return available[Math.floor(Math.random() * available.length)];
      }

      if (initialMood === 'focus') {
        // FOCUS: 80% keep current, 10% zen, 10% bamboo. Stable.
        if (currentBiome && Math.random() < 0.8) return currentBiome;
        return Math.random() < 0.5 ? 'zen' : 'bamboo';
      }

      if (initialMood === 'calm') {
        // CALM: 80% keep current. On deep idle, bias toward interactive biomes.
        if (currentBiome && Math.random() < 0.8) return currentBiome;
        if (bias && bias.length > 0) {
          return bias[Math.floor(Math.random() * bias.length)];
        }
        const calmBiomes = ['snow', 'zen', 'shrine'];
        return calmBiomes[Math.floor(Math.random() * calmBiomes.length)];
      }

      // Fallback
      return BIOMES[Math.floor(Math.random() * BIOMES.length)];
    };

    function AndoHomepage() {
      const windSpeed = 1.0;
      const [moodSelected, setMoodSelected] = useState(true);
      const [scrollSpeed, setScrollSpeed] = useState(MOOD_MAP.explore.speed);
      const [filterIntensity, setFilterIntensity] = useState(MOOD_MAP.explore.filter);
      const moodSpeedRef = useRef(MOOD_MAP.explore.speed);
      const [initialMood, setInitialMood] = useState('explore');

      const [showDev, setShowDev] = useState(false);
      const [activeTab, setActiveTab] = useState('meditation');
      const [intentionHint, setIntentionHint] = useState(true);
      const [showMoodButtons, setShowMoodButtons] = useState(true);
      const navRef = useRef(null);
      const [pillStyle, setPillStyle] = useState({ left: 0, width: 0 });
      const [medBtnOffset, setMedBtnOffset] = useState(0); // px offset from footer center to meditation btn center
      const [chunks, setChunks] = useState(() => {
        const startBiome = MOOD_MAP.explore.biome;
        const now = Date.now();
        return Array.from({ length: 6 }, (_, i) => ({ id: now + i, biome: startBiome }));
      });
      const xOffset = useMotionValue(0);
      const [visibleBiomes, setVisibleBiomes] = useState([]);
      const chunksRef = useRef(null);

      useEffect(() => {
        if (!navRef.current) return;
        const nav = navRef.current;
        const btn = nav.querySelector(`[data-tab="${activeTab}"]`);
        if (!btn) return;
        const navRect = nav.getBoundingClientRect();
        const btnRect = btn.getBoundingClientRect();
        setPillStyle({
          left: btnRect.left - navRect.left,
          top: btnRect.top - navRect.top,
          width: btnRect.width,
          height: btnRect.height,
        });
        // Track meditation button offset from footer center for arc positioning
        const medBtn = nav.querySelector('[data-tab="meditation"]');
        if (medBtn) {
          const medRect = medBtn.getBoundingClientRect();
          const medCenterX = medRect.left + medRect.width / 2;
          const footerEl = nav.parentElement;
          if (footerEl) {
            const footerRect = footerEl.getBoundingClientRect();
            const footerCenterX = footerRect.left + footerRect.width / 2;
            setMedBtnOffset(medCenterX - footerCenterX);
          }
        }
      }, [activeTab]);

      const handleMoodSelect = (mood) => {
        setIntentionHint(false);
        // Hide mood buttons after a brief moment
        setTimeout(() => setShowMoodButtons(false), 1200);
        const config = MOOD_MAP[mood];
        moodSpeedRef.current = config.speed;
        setScrollSpeed(config.speed);
        setFilterIntensity(config.filter);
        // Rebuild chunks starting with the chosen biome
        const startBiome = config.biome;
        xOffset.set(0);
        setChunks([
          { id: Date.now(), biome: startBiome },
          { id: Date.now()+1, biome: startBiome },
          { id: Date.now()+2, biome: startBiome },
          { id: Date.now()+3, biome: startBiome },
          { id: Date.now()+4, biome: startBiome },
          { id: Date.now()+5, biome: startBiome },
        ]);
        setInitialMood(mood);
        setMoodSelected(true);
      };

      // Force-switch: replace upcoming chunks with target biome
      const handleForceSwitch = (targetBiome) => {
        setChunks(prev => {
          // Keep first 2 chunks (currently visible), replace the rest with target
          const kept = prev.slice(0, 2);
          const newChunks = Array.from({ length: prev.length - 2 }, (_, i) => ({
            id: Date.now() + i,
            biome: targetBiome,
          }));
          return [...kept, ...newChunks];
        });
      };

      // Behavioral inference
      const { headerOpacity, detectedMood, whisper, whisperJp } = useBehaviorInference(moodSpeedRef.current, initialMood, setScrollSpeed, setFilterIntensity, handleForceSwitch);

      chunksRef.current = chunks;
      const frameCountRef = useRef(0);

      useAnimationFrame((t, delta) => {
        if (panPausedRef.current || !moodSelected) return;
        const moveBy = (110 * scrollSpeed * delta) / 1000;
        let currentX = xOffset.get() - moveBy;

        const firstChunkBiome = chunksRef.current?.[0]?.biome;
        const firstChunkW = getChunkWidth(firstChunkBiome);
        const recycleThreshold = firstChunkW + window.innerWidth + 2500;
        if (Math.abs(currentX) >= recycleThreshold) {
          currentX += firstChunkW;
          const nextBiome = getWeightedBiome(chunksRef.current?.map(c => c.biome), initialMood);
          flushSync(() => {
            setChunks(prev => [
              ...prev.slice(1),
              { id: Date.now(), biome: nextBiome }
            ]);
          });
        }
        xOffset.set(currentX);

        // Calculate which biomes are actually visible on screen
        if (chunksRef.current) {
          const screenW = window.innerWidth;
          const scrollPos = Math.abs(currentX);
          const vb = [];
          let cumX = 0;
          for (let i = 0; i < chunksRef.current.length; i++) {
            const cw = getChunkWidth(chunksRef.current[i].biome);
            if (cumX + cw > scrollPos && cumX < scrollPos + screenW) {
              vb.push(chunksRef.current[i].biome);
            }
            cumX += cw;
            if (cumX > scrollPos + screenW) break;
          }
          setVisibleBiomes(old => {
            const oldStr = old.sort().join(',');
            const newStr = vb.sort().join(',');
            if (vb.length > 0) behaviorState.currentBiome = vb[0];
            return oldStr === newStr ? old : vb;
          });
        }
      });

      return (
        <main className="relative w-full h-full overflow-hidden bg-[#EEECE4] selection:bg-[#BA3B31]/20 font-serif text-[#1C1F20]">

          {/* Mood buttons are now inside the footer below */}

          {/* intentionHint glow is handled inline on the buttons + breathing area */}

          {/* ===== BOTTOM NAV ===== */}
          <footer className="absolute bottom-0 left-0 right-0 z-[70] pointer-events-none flex flex-col items-stretch px-4 pb-4" style={{ opacity: headerOpacity, transition: 'opacity 5s ease' }}>

            <nav ref={navRef} className="nav-pill relative pointer-events-auto flex items-center rounded-full p-1.5 w-full"
              style={{
                background: 'rgba(255,255,255,0.25)',
                backdropFilter: 'blur(15px)',
                WebkitBackdropFilter: 'blur(15px)',
                border: '1px solid rgba(180,190,175,0.35)',
                boxShadow: '0 2px 16px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.15)',
              }}
            >
              {/* Animated active pill highlight — measured from actual button */}
              <div className="absolute rounded-full pointer-events-none transition-all duration-500 ease-[cubic-bezier(0.4,0,0.15,1)]"
                style={{
                  left: `${pillStyle.left}px`,
                  top: `${pillStyle.top}px`,
                  width: `${pillStyle.width}px`,
                  height: `${pillStyle.height}px`,
                  background: 'rgba(255,255,255,0.22)',
                  boxShadow: 'inset 0 0 8px rgba(255,255,255,0.12), 0 0 6px rgba(255,255,255,0.06)',
                  backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.04'/%3E%3C/svg%3E")`,
                }}
              />

              {[
                { id: 'explore',  label: 'Explore',  moodKey: 'explore' },
                { id: 'energize', label: 'Energize', moodKey: 'focus'   },
                { id: 'calm',     label: 'Calm',     moodKey: 'calm'    },
              ].map(tab => (
                <button
                  key={tab.id}
                  data-tab={tab.id}
                  onClick={() => { setActiveTab(tab.id); handleMoodSelect(tab.moodKey); }}
                  className="relative z-10 flex flex-1 items-center justify-center py-3 rounded-full transition-colors duration-500 font-sans whitespace-nowrap"
                  style={{
                    color: activeTab === tab.id ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.5)',
                    fontSize: '11px',
                    fontWeight: activeTab === tab.id ? 500 : 400,
                    letterSpacing: '0.25em',
                    textTransform: 'uppercase',
                  }}
                >
                  {tab.label}
                </button>
              ))}
            </nav>
          </footer>



          {/* DEV: Biome jump buttons (togglable) */}
          {showDev && (
            <div className="absolute top-2 left-2 z-[90] flex gap-1 pointer-events-auto opacity-30 hover:opacity-80 transition-opacity duration-300">
              {BIOMES.map(b => (
                <button
                  key={b}
                  onClick={() => {
                    xOffset.set(0);
                    setChunks([
                      { id: Date.now(), biome: b },
                      { id: Date.now()+1, biome: BIOMES[(BIOMES.indexOf(b)+1)%5] },
                      { id: Date.now()+2, biome: BIOMES[(BIOMES.indexOf(b)+2)%5] },
                      { id: Date.now()+3, biome: BIOMES[(BIOMES.indexOf(b)+3)%5] },
                      { id: Date.now()+4, biome: BIOMES[(BIOMES.indexOf(b)+4)%5] },
                    ]);
                  }}
                  className="px-2 py-0.5 bg-black/30 text-white text-[10px] rounded backdrop-blur-sm hover:bg-black/60 transition-colors capitalize"
                >{b}</button>
              ))}
            </div>
          )}

          {/* Dev toggle button — bottom right */}
          <button
            onClick={() => setShowDev(d => !d)}
            className="fixed bottom-14 right-3 z-[99] w-6 h-6 rounded-full flex items-center justify-center pointer-events-auto transition-all duration-300"
            style={{ background: showDev ? 'rgba(0,0,0,0.35)' : 'rgba(0,0,0,0.12)', backdropFilter: 'blur(4px)', WebkitBackdropFilter: 'blur(4px)', border: '1px solid rgba(255,255,255,0.1)' }}
            title={showDev ? 'Hide dev tools' : 'Show dev tools'}
          >
            <span className="text-white text-[8px] font-mono" style={{ opacity: showDev ? 0.8 : 0.35 }}>⚙</span>
          </button>

          <div className="absolute inset-0 z-10 flex">

            {/* Sky gradient */}
            <div className="absolute inset-0 pointer-events-none z-[0]" style={{ background: 'linear-gradient(to bottom, #C8D5DC 0%, #D4DADE 20%, #DDE2DF 40%, #E4E1D8 70%)' }} />

            {/* Sun/moon glow */}
            <div className="absolute top-[15%] right-[25%] w-[31.20px] h-[31.20px] rounded-full bg-[#FFFFFF] opacity-80 pointer-events-none z-[1]" style={{ filter: 'blur(4px)' }} />

            {/* Soft clouds */}
            <div className="absolute top-[8%] left-[10%] w-[78.00px] h-[50.64px] rounded-full bg-white opacity-25 pointer-events-none z-[1]" style={{ filter: 'blur(20px)' }} />
            <div className="absolute top-[12%] left-[55%] w-[58.50px] h-[42.20px] rounded-full bg-white opacity-20 pointer-events-none z-[1]" style={{ filter: 'blur(18px)' }} />
            <div className="absolute top-[6%] right-[15%] w-[46.80px] h-[33.76px] rounded-full bg-white opacity-15 pointer-events-none z-[1]" style={{ filter: 'blur(22px)' }} />

            {/* Very distant mountain layer (slowest) */}
            <div
              className="absolute inset-y-0 left-0 w-[200%] flex items-end pointer-events-none opacity-30 z-[0] will-change-transform"
              style={{ animation: 'mountainScroll1 600s linear infinite' }}
            >
              <svg viewBox="0 0 1000 300" preserveAspectRatio="none" className="w-full h-[573.92px] fill-[#C0CAD0]">
                <path d="M0,300 L0,200 Q50,160 100,190 Q200,100 300,170 Q400,130 450,80 Q500,130 550,160 Q650,100 750,150 Q850,90 900,140 Q950,170 1000,200 L1000,300 Z" />
              </svg>
            </div>

            {/* Far mountains with tree silhouette ridge */}
            <div
              className="absolute inset-y-0 left-0 w-[200%] flex items-end pointer-events-none opacity-50 z-[1] will-change-transform"
              style={{ animation: 'mountainScroll1 400s linear infinite' }}
            >
              <svg viewBox="0 0 1000 300" preserveAspectRatio="none" className="w-full h-[506.40px] fill-[#B5C2C9]">
                <path d="M0,300 L0,180 L80,220 L150,120 L270,190 L380,80 L500,180 L580,220 L650,120 L770,190 L880,80 L1000,180 L1000,300 Z" />
              </svg>
            </div>

            {/* Mid mountains */}
            <div
              className="absolute inset-y-0 left-0 w-[200%] flex items-end pointer-events-none opacity-70 z-[1] will-change-transform"
              style={{ animation: 'mountainScroll2 280s linear infinite' }}
            >
              <svg viewBox="0 0 1000 300" preserveAspectRatio="none" className="w-full h-[405.12px] fill-[#8A9BA3]">
                <path d="M0,300 L0,220 L60,180 L120,240 L280,100 L400,160 L500,220 L560,180 L620,240 L780,100 L900,160 L1000,220 L1000,300 Z" />
              </svg>
            </div>

            {/* Near mountains (closest, most detailed) */}
            <div
              className="absolute inset-y-0 left-0 w-[200%] flex items-end pointer-events-none opacity-90 z-[2] will-change-transform"
              style={{ animation: 'mountainScroll3 180s linear infinite' }}
            >
              <svg viewBox="0 0 1000 300" preserveAspectRatio="none" className="w-full h-[320.72px] fill-[#5B717B]">
                <path d="M0,300 L0,230 Q20,210 30,220 Q50,150 70,200 Q100,220 120,180 Q150,150 180,210 Q250,160 300,230 Q350,210 370,180 Q400,160 430,220 L500,230 Q520,210 530,220 Q550,150 570,200 Q600,220 620,180 Q650,150 680,210 Q750,160 800,230 Q850,210 870,180 Q900,160 930,220 L1000,230 L1000,300 Z" />
              </svg>
            </div>

            <div className="mist-layer" />

            <GroundPlane />

            <motion.div 
              className="absolute inset-y-0 left-0 flex items-end will-change-transform z-[10]"
              style={{ x: xOffset }}
            >
              {chunks.map((chunk) => (
                <div key={chunk.id} className="h-full flex-shrink-0" style={{ position: 'relative', overflow: 'visible', width: `${getChunkWidth(chunk.biome)}px`, marginRight: '-1px' }}>
                  <BiomeChunk biome={chunk.biome} windSpeed={windSpeed} />
                </div>
              ))}
            </motion.div>

            <ShibaDog />
            <BiomeMusic visibleBiomes={visibleBiomes} />
            <SakuraParticles visibleBiomes={visibleBiomes} />

            {/* Global biome atmosphere overlays - always rendered, opacity transitions */}
            <div className="absolute inset-0 z-[46] pointer-events-none" style={{ background: 'linear-gradient(180deg, rgba(50,35,20,0.45) 0%, rgba(60,40,25,0.35) 40%, rgba(70,50,30,0.2) 70%, rgba(80,55,30,0.1) 100%)', opacity: visibleBiomes.includes('shrine') ? filterIntensity : 0, transition: 'opacity 3.5s ease-in-out' }} />
            <div className="absolute inset-0 z-[46] pointer-events-none" style={{ background: 'linear-gradient(180deg, rgba(15,22,15,0.4) 0%, rgba(10,18,10,0.3) 50%, rgba(10,18,10,0.15) 100%)', opacity: visibleBiomes.includes('bamboo') ? filterIntensity : 0, transition: 'opacity 3.5s ease-in-out' }} />
            <div className="absolute inset-0 z-[46] pointer-events-none" style={{ background: 'linear-gradient(180deg, rgba(210,185,140,0.25) 0%, rgba(220,195,150,0.15) 50%, transparent 100%)', opacity: visibleBiomes.includes('zen') ? filterIntensity : 0, transition: 'opacity 3.5s ease-in-out' }} />
            <div className="absolute inset-0 z-[46] pointer-events-none" style={{ background: 'linear-gradient(180deg, rgba(220,160,170,0.3) 0%, rgba(230,175,180,0.2) 40%, rgba(240,190,195,0.1) 70%, transparent 100%)', opacity: visibleBiomes.includes('sakura') ? filterIntensity : 0, transition: 'opacity 3.5s ease-in-out' }} />
            <div className="absolute inset-0 z-[46] pointer-events-none" style={{ background: 'linear-gradient(180deg, rgba(100,80,140,0.35) 0%, rgba(110,85,150,0.25) 40%, rgba(120,95,155,0.15) 70%, transparent 100%)', opacity: visibleBiomes.includes('snow') ? filterIntensity : 0, transition: 'opacity 3.5s ease-in-out' }} />

          </div>

          <AnimatePresence mode="wait">
            {intentionHint ? (
              <span key="intention-placeholder" />
            ) : (
              <motion.div
                key="breathing"
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                transition={{ duration: 1.2, delay: 0.3 }}
              >
                <BreathingCircle
                  moodColor={(ADAPTIVE_GOALS[initialMood] || {})[detectedMood]?.circleColor}
                  ensoSize={(ADAPTIVE_GOALS[initialMood] || {})[detectedMood]?.ensoSize || 44}
                />
              </motion.div>
            )}
          </AnimatePresence>
          <MoodWhisper text={whisper} textJp={whisperJp} />

          <div className="paper-texture" />
          
        </main>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<AndoHomepage />);
  </script>
</body>
</html>
